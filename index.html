<body>
    <header>
        <!-- 제일 상단 swiper 박스 -->
        <div class="swiper-container">
            <!-- 왼쪽 맨끝에 배치 -->
            <div class="left-icon">
                <a href="#" target="_blank" title="왼쪽이동">
                    <img src="./img/Previous slide.svg" alt="왼클릭">
                </a>
            </div>
            <!-- swiper 글자 묶음 -->
            <ul class="swiper-ul">
                <li class="s-item s-item01"><a href="#" target="_blank" title="바로가기">골든래빗 신제품 바로가기</a></li>
                <li class="s-item s-item02"><a href="#" target="_blank" title="바로가기">Asia Website Open!</a></li>

            </ul>
            <!-- 오른쪽 맨끝에 배치-->
             <div class="right-box">
                 <div class="right-icon">
                     <a href="#" target="_blank" title="오른쪽이동">
                         <img src="./img/Vector.svg" alt="우클릭">
                     </a>
                 </div>
                 <div class="close-box">
                     <a href="#" target="_blank" title="창 닫기">
                         <img src="./img/div.main-line-banner-close.svg" alt="x">
                     </a>
                 </div>
             </div>

        </div>
        <div class="inner-bar">
            <h1 class="logo-box">
                <a href="#" target="_blank" title="home">
                    <img src="./img/logo.svg" alt="logo-img">
                </a>
            </h1>
            <nav class="menu01-left">
                <ul class="menu01-left-ul">
                    <li class="m01-item m01-item01"><a href="#" target="_blank" title="ABOUT">ABOUT</a></li>
                    <li class="m01-item m01-item02"><a href="#" target="_blank" title="SHOP">SHOP</a></li>
                    <li class="m01-item m01-item03"><a href="#" target="_blank" title="JOURNAL">JOURNAL</a></li>
                    <li class="m01-item m01-item04"><a href="#" target="_blank" title="COMMUNITY">COMMUNITY</a></li>
                    <li class="m01-item m01-item05"><a href="#" target="_blank" title="TABLING SIMULATOR">TABLING SIMULATOR</a></li>
                </ul>
            </nav>
            <nav class="menu01-right">
                <ul class="menu02-right-ul">
                    <li class="m02-item m02-item01"></li>
                    <li class="m02-item m02-item02"><a href="#" target="_blank" title="LOGIN">LOGIN</a></li>
                    <li class="m02-item m02-item03"><a href="#" target="_blank" title="CART">CART</a></li>
                    <li class="m02-item m02-item03"><a href="#" target="_blank" title="(0)">(0)</a></li>
                </ul>
            </nav>

    <main>   </main>
